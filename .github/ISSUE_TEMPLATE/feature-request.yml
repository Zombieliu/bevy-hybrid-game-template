name: Feature request
description: Suggest a template-level capability or improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What recurring project pain should the template solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the template-level feature you want
    validations:
      required: true
  - type: textarea
    id: boundaries
    attributes:
      label: Constraints
      description: Keep this focused on reusable template value, not project-specific gameplay
